<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro QR - HDM México</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#005B9A", 
                        "primary-dark": "#004575",
                        "surface": "#FFFFFF",
                        "background": "#F8FAFC",
                        "text-main": "#1E293B",
                        "text-sub": "#64748B",
                    },
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    boxShadow: { 'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.04)' }
                }
            }
        };
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0084CA 0%, #005B9A 100%); background-attachment: fixed; }
        #reader video { object-fit: cover; border-radius: 0.5rem; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4 antialiased">

    <div class="w-full max-w-[420px] bg-surface rounded-2xl shadow-premium border border-slate-100 overflow-hidden relative">
        <div class="p-6 sm:p-8">
            
            <div class="flex flex-col items-center mb-6 text-center">
                <img src="https://i.ibb.co/rCsz6hh/LOGOTIPO.png" alt="Logo HDM" class="mb-4 object-contain h-20"> 
                <h1 class="text-xl font-extrabold text-[#1E293B] tracking-tight">Registro del producto por QR</h1>
                <p class="text-xs font-medium text-[#64748B] mt-1">Sistemas de Filtración de Agua SA. de C.V.</p>
            </div>

            <div id="scannerContainer" class="mb-6">
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-xs font-bold text-slate-700 flex items-center">
                        <span class="material-symbols-outlined text-sm mr-1 text-primary">qr_code_scanner</span> Escanee el producto
                    </span>
                </div>
                <div id="reader" class="w-full rounded-xl border-2 border-slate-200 shadow-sm overflow-hidden"></div>
            </div>

            <form id="qrForm" class="space-y-4">
                
                <div>
                    <label class="text-[12px] font-bold text-slate-700 ml-0.5 uppercase tracking-wide">Folio:</label>
                    <input type="text" id="ticket" required class="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-primary uppercase font-bold text-primary placeholder-slate-400" placeholder="Ej. HDM-0080">
                </div>

                <div>
                    <label class="text-[12px] font-bold text-slate-700 ml-0.5 uppercase tracking-wide">Nombre del producto:</label>
                    <input type="text" id="productName" required readonly class="w-full mt-1 px-4 py-3 bg-slate-100 border border-slate-200 rounded-lg text-xs font-semibold text-slate-700 focus:outline-none cursor-not-allowed" placeholder="---">
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div class="col-span-2">
                        <label class="text-[12px] font-bold text-slate-700 ml-0.5 uppercase tracking-wide">Código:</label>
                        <input type="text" id="qrData" required readonly class="w-full mt-1 px-4 py-3 bg-slate-100 border border-slate-200 rounded-lg text-sm font-mono text-slate-600 focus:outline-none cursor-not-allowed" placeholder="Esperando escaneo...">
                    </div>
                    <div class="col-span-1">
                        <label class="text-[12px] font-bold text-slate-700 ml-0.5 uppercase tracking-wide">Unidad:</label>
                        <input type="text" id="unidad" readonly class="w-full mt-1 px-3 py-3 bg-slate-100 border border-slate-200 rounded-lg text-xs font-bold text-center text-slate-700 focus:outline-none cursor-not-allowed" placeholder="---">
                    </div>
                </div>

                <div>
                    <label class="text-[12px] font-bold text-slate-700 ml-0.5 uppercase tracking-wide">Cantidad a registrar:</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">tag</span>
                        <input type="number" id="quantity" step="0.01" required disabled class="w-full mt-1 pl-10 pr-4 py-3 bg-white border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary disabled:bg-slate-100 disabled:cursor-not-allowed" placeholder="0.00">
                    </div>
                </div>

                <div id="statusMsg" class="hidden py-3 px-4 rounded-lg text-sm font-semibold text-center mt-2 animate-fade-in"></div>

                <div class="pt-4 space-y-3">
                    <button type="submit" id="btnEnviar" disabled class="w-full py-3.5 bg-emerald-600 text-white text-sm font-bold rounded-xl shadow-md hover:bg-emerald-700 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center uppercase tracking-wider">
                        <span class="material-symbols-outlined mr-2">save</span> ENVIAR REGISTRO
                    </button>

                    <button type="button" onclick="reiniciarEscaneo()" class="w-full py-2.5 bg-slate-100 text-slate-600 hover:text-slate-800 text-xs font-bold rounded-lg transition-all flex items-center justify-center uppercase">
                        <span class="material-symbols-outlined text-sm mr-1">refresh</span> Escanear otro producto
                    </button>
                    
                    <button type="button" onclick="cerrarSesion()" class="w-full py-3.5 bg-red-600 text-white text-sm font-bold rounded-xl shadow-md hover:bg-red-700 transition-all active:scale-[0.98] flex items-center justify-center uppercase tracking-wider">
                        <span class="material-symbols-outlined mr-2">logout</span> CERRAR SESIÓN
                    </button>
                </div>
            </form>

        </div>
    </div>
    
    <div class="mt-6 mb-4 text-center">
        <p class="text-[11px] font-medium uppercase tracking-widest text-white/70 drop-shadow-md">
            © 2026 HDM MÉXICO. Todos los derechos reservados.
        </p>
    </div>

    <script>
        // ======================================================================
        // 🔴🔴 PEGA AQUÍ TU ENLACE DE GOOGLE APPS SCRIPT (Termina en /exec) 🔴🔴
        // ======================================================================
        const API_URL = "https://script.google.com/macros/s/AKfycbxuzyU-jcrktqxse96JksxyJLxbDlnvQdOanEj1hQRp70oqt3woI8sSeivDx9y7fVQk/exec";

        let html5QrCode;
        const statusDiv = document.getElementById('statusMsg');
        const btnEnviar = document.getElementById('btnEnviar');
        const inputQR = document.getElementById('qrData');
        const inputName = document.getElementById('productName');
        const inputUnidad = document.getElementById('unidad');
        const inputQty = document.getElementById('quantity');

        // Wrapper universal para Fetch (POST)
        async function apiCall(action, params = {}) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: action, ...params })
                });
                return await response.json();
            } catch (error) {
                return { error: "Error de conexión con el servidor." };
            }
        }

        // Función auxiliar para mostrar mensajes
        function showStatus(msg, isError = false) {
            statusDiv.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-emerald-100', 'text-emerald-700', 'bg-blue-100', 'text-blue-700');
            statusDiv.classList.add('block');
            
            if (isError === true) {
                statusDiv.classList.add('bg-red-100', 'text-red-700');
            } else if (isError === false) {
                statusDiv.classList.add('bg-emerald-100', 'text-emerald-700');
            } else {
                statusDiv.classList.add('bg-blue-100', 'text-blue-700'); // Info
            }
            statusDiv.innerText = msg;
        }

        // ================= MOTOR DE CÁMARA =================
        function startScanner() {
            if (html5QrCode && html5QrCode.isScanning) { html5QrCode.stop().catch(e=>e); }
            
            const config = { fps: 10, qrbox: { width: 220, height: 220 } };
            html5QrCode = new Html5Qrcode("reader");
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
            });
        }

        // ================= AL ESCANEAR EL CÓDIGO QR =================
        async function onScanSuccess(decodedText) {
            html5QrCode.stop().catch(e=>e); // Detiene cámara
            document.getElementById('reader').innerHTML = "<div class='p-10 text-center text-slate-500 font-bold'>Buscando producto...</div>";
            
            inputQR.value = decodedText;
            inputName.value = "Buscando...";
            inputUnidad.value = "-";
            showStatus("Consultando base de datos...", null);

            const result = await apiCall('getProductName', { qrCode: decodedText });

            if (result.error) {
                showStatus(result.error, true);
                inputName.value = "No encontrado";
                inputUnidad.value = "";
                // Reactivamos el botón limpiar para que puedan escanear de nuevo
                setTimeout(() => startScanner(), 2500);
            } else {
                statusDiv.classList.add('hidden'); // Ocultar si fue éxito
                inputName.value = result.nombre;
                inputUnidad.value = result.unidad;
                
                inputQty.disabled = false; // Habilitar cantidad
                btnEnviar.disabled = false; // Habilitar botón enviar
                inputQty.focus();
            }
        }

        // ================= AL ENVIAR EL FORMULARIO =================
        document.getElementById('qrForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!inputQR.value || !inputQty.value || document.getElementById('ticket').value.trim() === "") {
                showStatus('Faltan datos obligatorios.', true);
                return;
            }

            // Bloquear botón para evitar doble clic
            btnEnviar.disabled = true;
            btnEnviar.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">autorenew</span> GUARDANDO...';
            showStatus("Registrando en el sistema...", null);

            const formData = {
                ticket: document.getElementById('ticket').value.trim(),
                qrData: inputQR.value,
                productName: inputName.value,
                unidad: inputUnidad.value,
                quantity: inputQty.value
            };

            const result = await apiCall('processForm', { formData: formData });

            // 🔴 Reactivamos el botón SIEMPRE para no bloquear el flujo
            btnEnviar.disabled = false;
            btnEnviar.innerHTML = '<span class="material-symbols-outlined mr-2">save</span> ENVIAR REGISTRO';

            if (result.error) {
                showStatus(result.error, true);
            } else {
                showStatus(result.success, false);
                
                // Limpiamos campos para el siguiente registro (conservando el folio)
                inputQR.value = "";
                inputName.value = "";
                inputUnidad.value = "";
                inputQty.value = "";
                inputQty.disabled = true; 
                
                // Reiniciar cámara automáticamente tras 2 segundos
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                    startScanner();
                }, 2000);
            }
        });

        // Botón de Escanear de nuevo manualmente
        function reiniciarEscaneo() {
            inputQR.value = "";
            inputName.value = "";
            inputUnidad.value = "";
            inputQty.value = "";
            inputQty.disabled = true;
            btnEnviar.disabled = true;
            statusDiv.classList.add('hidden');
            startScanner();
        }

        // Botón de Cerrar Sesión
        function cerrarSesion() {
            window.top.location.href = 'https://hdmordendeservicios-cloud.github.io/HDMAPI/';
        }

        // Arrancar cámara al cargar la página
        window.onload = startScanner;
    </script>
</body>
</html>
